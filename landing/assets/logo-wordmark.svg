<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" role="img" aria-label="Integris Clinical Services LLC">
  <!-- ── Icon mark (left) — shield in navy circle ── -->
  <!-- Background circle -->
  <circle cx="70" cy="70" r="65" fill="#1A3C6E"/>
  <circle cx="70" cy="70" r="65" fill="none" stroke="#1A3C6E" stroke-width="2"/>
  <circle cx="70" cy="70" r="57" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>

  <!-- Shield white body -->
  <path d="M 33,28 L 107,28 L 107,78
           C 107,97 92,111 70,118
           C 48,111 33,97 33,78 Z"
        fill="#FFFFFF"/>

  <!-- Shield navy interior -->
  <path d="M 38,33 L 102,33 L 102,77
           C 102,94 89,106 70,112
           C 51,106 38,94 38,77 Z"
        fill="#1A3C6E"/>

  <!-- Greek key circle (small) -->
  <circle cx="70" cy="65" r="20" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>

  <!-- Greek key arms (simplified at this scale) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="square">
    <path d="M 71,66 L 71,59 L 80,59 L 80,55 L 62,55 L 62,75"/>
    <path d="M 69,64 L 69,71 L 76,71 L 76,77 L 58,77 L 58,63"/>
    <path d="M 69,64 L 69,71 L 60,71 L 60,75 L 78,75 L 78,55"/>
    <path d="M 71,66 L 71,57 L 62,57 L 62,53 L 80,53 L 80,67"/>
  </g>
  <circle cx="70" cy="65" r="2.5" fill="#FFFFFF"/>

  <!-- ── Wordmark text (right of icon) ── -->
  <!-- Primary name -->
  <text x="155" y="58"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="600" fill="#1A3C6E"
        letter-spacing="1">INTEGRIS</text>

  <!-- Subtitle line 1 -->
  <text x="157" y="85"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="19" font-weight="400" fill="#1A3C6E"
        letter-spacing="5">CLINICAL SERVICES</text>

  <!-- Divider rule -->
  <line x1="155" y1="96" x2="600" y2="96" stroke="#1A3C6E" stroke-width="0.75" opacity="0.3"/>

  <!-- LLC + tagline -->
  <text x="157" y="115"
        font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#4A7FC1"
        letter-spacing="3">LLC  ·  SAN ANTONIO, TEXAS</text>
</svg>

steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'deploy-landing'
    args:
      - '-m'
      - 'cp'
      - '-r'
      - 'landing/.'
      - 'gs://integris-clinical-landing'
  
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'set-cache-control'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:no-cache, no-store'
      - 'gs://integris-clinical-landing/index.html'

options:
  logging: CLOUD_LOGGING_ONLY


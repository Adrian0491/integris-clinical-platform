# =============================================================================
# nginx — production config for Angular SPA
# Gzip, security headers, Angular HTML5 routing, health endpoint
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;   # don't expose nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/rss+xml application/atom+xml image/svg+xml
        application/x-font-ttf font/opentype;

    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers (HIPAA / OWASP) ──────────────────────────────────
        add_header X-Frame-Options              "DENY"                  always;
        add_header X-Content-Type-Options       "nosniff"              always;
        add_header X-XSS-Protection            "1; mode=block"         always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy          "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline'; \
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
             font-src 'self' https://fonts.gstatic.com; \
             img-src 'self' data:; \
             connect-src 'self' https:; \
             frame-ancestors 'none';" always;

        # ── Health check for Cloud Run ─────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","component":"frontend"}';
            add_header Content-Type application/json;
        }

        # ── Angular static assets with long-lived cache ────────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Angular HTML5 routing — all paths → index.html ───────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Block common attack paths ──────────────────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 403;
        }

        location ~ /\. {
            deny all;
            return 404;
        }
    }
}

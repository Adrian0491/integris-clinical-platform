version: "3.9"

# ---------------------------------------------------------------------------
# CDTool local development stack
#
# Usage:
#   docker compose up -d            — start all services
#   docker compose up -d db redis   — start infra only
#   docker compose logs -f api      — tail API logs
#   docker compose down -v          — stop and remove volumes
# ---------------------------------------------------------------------------

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cdtool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdtool_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-cdtool}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdtool}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Create test database alongside the main one ───────────────────────────
  db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-cdtool_dev}
    entrypoint: >
      sh -c "psql -h db -U ${POSTGRES_USER:-cdtool} -d ${POSTGRES_DB:-cdtool}
             -c 'CREATE DATABASE cdtool_test;' 2>/dev/null || true"
    restart: "no"

  # ── Redis (Celery broker + result backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Elasticsearch (findings index, real-time monitoring) ──────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"    # disabled for local dev
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── FastAPI application server ────────────────────────────────────────────
  api:
    build:
      context: .                       # project root (so bk/ and backend/ both visible)
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-cdtool}:${POSTGRES_PASSWORD:-cdtool_dev}@db:5432/${POSTGRES_DB:-cdtool}
      REDIS_URL:          redis://redis:6379/0
      ELASTICSEARCH_URL:  http://elasticsearch:9200
      STORAGE_BACKEND:    local
      STORAGE_LOCAL_PATH: /app/storage
      PYTHONPATH:         /app:/app/backend
    volumes:
      - ./storage:/app/storage         # persist uploaded files in dev
      - .:/app                         # live reload source code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/backend
        --reload-dir /app/bk
        --reload-dir /app/ingest

  # ── Celery worker (validation jobs) ──────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-cdtool}:${POSTGRES_PASSWORD:-cdtool_dev}@db:5432/${POSTGRES_DB:-cdtool}
      REDIS_URL:          redis://redis:6379/0
      ELASTICSEARCH_URL:  http://elasticsearch:9200
      STORAGE_BACKEND:    local
      STORAGE_LOCAL_PATH: /app/storage
      PYTHONPATH:         /app:/app/backend
    volumes:
      - ./storage:/app/storage
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=2
        -Q validation

volumes:
  postgres_data:
  redis_data:
  es_data:

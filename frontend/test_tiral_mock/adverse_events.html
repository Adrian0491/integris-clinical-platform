<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Adverse Events</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Adverse Events</h1>
        </header>
        <button id="saveBtn" class="save-btn" aria-label="Save" (onSave)="handleSave()">
            Save
        </button>
        <main>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsReported">Adverse Events Reported
                            <select id="AEPERF" name="referrer" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                        <label for="adverseEventsStartDate">Adverse Event Start Date<input type="date" id="AESTDT" name="adverseEventsDate"></label>
                    </fieldset>                
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsDescription">Is the adverse event ongoing?
                            <select id="AEONGO" name="adverseEventsOngoing" required>
                                <option value="">(select one)</option>
                                    <option value="1">Yes</option>
                                    <option value="2">No</option>
                            </select>
                        </label>
                        <label for="adverseEventsEndDate">Adverse Event End Date<input type="date" id="AEEDT" name="adverseEventsEndDate"></label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsSeverity">What is the severity of the adverse event?
                            <select id="AESEVERITY" name="adverseEventsSeverity" required>
                                <option value="">(select one)</option>
                                <option value="1">Mild</option>
                                <option value="2">Moderate</option>
                                <option value="3">Severe</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsSerious">Was the adverse event serious?
                            <select id="AESEVR" name="adverseEventsSerious" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsDeath">Did the adverse event result in death?
                            <select id="AEDTH" name="adverseEventsDeath" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsRelated">Was the adverse event life threatening?
                            <select id="AELFTRL" name="adverseEventsRelated" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsHospitalization">Did the adverse event result in initial or prolonged hospitalization for the subject?
                            <select id="AEHOSP" name="adverseEventsHospitalization" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsDisability">Did the adverse event result in disability or permanent damage?
                            <select id="AEDIS" name="adverseEventsDisability" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsCongenital">Was the adverse event associated with a congenital anomaly or birth defect?
                            <select id="AEREL" name="adverseEventsCongenital" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsOther">Was the adverse event a medically important event not covered by other serious criteria?
                            <select id="AEOTHR" name="adverseEventsOther" required>
                                <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsRelatedness">What is the relationship of the adverse event to the study drug?
                            <select id="AEREL" name="adverseEventsRelatedness" required>
                                <option value="">(select one)</option>
                                <option value="1">Not related</option>
                                <option value="2">Unrelated</option>
                                <option value="3">Possibly related</option>
                                <option value="4">Probably related</option>
                                <option value="5">Definitely related</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsActionTaken">What action was taken with the study drug as a result of the adverse event?
                            <select id="AEACTION" name="adverseEventsActionTaken" required>
                                <option value="">(select one)</option>
                                <option value="1">None</option>
                                <option value="2">Dose reduced</option>
                                <option value="3">Dose interrupted</option>
                                <option value="4">Dose interrupted and then reduced</option>
                                <option value="5">Drug withdrawn</option>
                                <option value="6">Not Applicable</option>
                                <option value="7">Unknown</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsOtherAction">What other action was taken? <input type="text"></label>
                    </fieldset>
                </section>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="adverseEventsOutcome">What was the outcome of the adverse event?
                            <select id="AEOUT" name="adverseEventsOutcome" required>
                                <option value="">(select one)</option>
                                <option value="1">Recovered/resolved</option>
                                <option value="2">Recovering/resolving</option>
                                <option value="3">Not recovered/not resolved</option>
                                <option value="4">Recovered/resolved with sequelae</option>
                                <option value="5">Fatal</option>
                                <option value="6">Unknown</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
        </main>
    </body>
</html>

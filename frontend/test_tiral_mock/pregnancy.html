<!DOCTYPE html "${DMSEX}"="F">
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pregnancy Assessment</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main>
            <div>
                <header>
                    <h1>
                        Pregnancy Assessment
                    </h1>
                </header>
            </div>
            <div>
                <section>
                    <fieldset>
                        <label for="pregnant">Was a pregnancy test performed?
                            <select id="RPPERF" name="Pregnancy Test Performed">
                                <option value="">(select one)</option>
                                <option value="Y">Yes</option>
                                <option value="N">No</option>
                                <option value="U">Unknown</option>
                            </select>
                        </label>
                        <label for="preg_test_date">Date of collectionS:<input id="RPTDT" name="Collection Date" type="date" required /></label>
                        <label for="preg_test_result">Pregnancy test result:
                            <select id="RPORRES" name="Pregnancy Test Result">
                                <option value="">(select one)</option>
                                <option value="P">Positive</option>
                                <option value="N">Negative</option>
                                <option value="I">Indeterminate</option>
                            </select>
                        </label>
                    </fieldset>
                </section>
            </div>
        </main>
    </body>
</html>

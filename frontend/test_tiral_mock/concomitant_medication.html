<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Concomitant Medication</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div>
        <header>
            <fieldset>
                <h1>Concomitant Medication</h1>
                <h3>CM - Concomitant Medications Header</h3>
            </fieldset>
        </header>
        </div>
        <div>
            <section>
                <fieldset>
                    <label for="concomitantMedication">Were any concomitant medications reported?
                        <select id="CMYN" name="concomitantMedication" required>
                            <option value="">(select one)</option>
                            <option value="1">Yes</option>
                            <option value="2">No</option>
                        </select>
                    </label>
                </fieldset>
                <fieldset>
                    <h4>CM - Concomitant Medications</h4>
                    <!--#To add future option that allows dinamically adding rows to the table for multiple medications, but for now just one row is provided for testing purposes.-->
                    <table>
                        <tr>
                            <th>Medication/Therapy</th>
                            <th>Indication</th>
                            <th>Dose</th>
                            <th>Units</th>
                            <th>Dose Form</th>
                            <th>Dose Frequency</th>
                            <th>Route</th>
                            <th>Start Date</th>
                            <th>Ongoing</th>
                            <th>End Date</th>
                        </tr>
                        <tr>
                            <td><input type="text" name="medication" id="CMTRT"></td>
                            <td><input type="text" name="indication" id="CMIND"></td>
                            <td><input type="text" name="dose" id="CMDOS"></td>
                            <td>
                                <select name="doseForm" id="CMDOSU">
                                    <option value="%(v/v)">[%(v/v)] Percent Volume per Volume</option>
                                    <option value="CAPSULE">Capsule</option>
                                    <option value="g">Gram</option>
                                    <option value="INHALATION">Inhalation</option>
                                    <option value="IU">International Dosing Unit</option>
                                    <option value="L/h">Liter per Hour</option>
                                    <option value="L/min">Liter per Minute</option>
                                    <option value="mg">Milligram</option>
                                    <option value="mg/kg">Milligram per Kilogram</option>
                                    <option value="mL">Milliliter</option>
                                    <option value="mL/h">Milliliter per Hour</option>
                                    <option value="mL/kg">Milliliter per Kilogram</option>
                                    <option value="PUFF">Puff</option>
                                    <option value="SPRAY">Spray</option>
                                    <option value="TABLET">Tablet</option>
                                    <option value="µg">Microgram</option>
                                    <option value="µg/kg">Microgram per Kilogram</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </td>
                            <td>
                                <select name="doseForm" id="CMDOSFRM">
                                    <option value="aerosol">Aerosol</option>
                                    <option value="capsule">Capsule</option>
                                    <option value="cream">Cream</option>
                                    <option value="gas">Gas</option>
                                    <option value="gel">Gel</option>
                                    <option value="inhalation">Inhalation</option>
                                    <option value="injection">Injection</option>
                                    <option value="liquid">Liquid</option>
                                    <option value="ointment">Ointment</option>
                                    <option value="patch">Patch</option>
                                    <option value="powder">Powder</option>
                                    <option value="spray">Spray</option>
                                    <option value="suppository">Suppository</option>
                                    <option value="suspension">Suspension</option>
                                    <option value="tablet">Tablet</option>
                                    <option value="other">Other</option>
                                </select>
                                <input type="text" name="doseFormOther" id="DOSFRMO" placeholder="If other, please specify">
                            </td>
                            <td>
                                <select name="doseFrequency" id="CNDISFRQ">
                                    <option value="BID">Twice Daily</option>
                                    <option value="ONCE">Once</option>
                                    <option value="PRN">As Needed</option>
                                    <option value="QD">Daily</option>
                                    <option value="QOD">Every Other Day</option>
                                    <option value="TID">Three Times Daily</option>
                                    <option value="UNKNOWN">Unknown</option>
                                    <option value="OTHER">Other</option>
                                </select>
                                <input type="text" name="doseFrequencyOther" id="DOSFRQO" placeholder="If other, please specify">
                            </td>
                            <td>
                                <select name="Route" id="CMROUTE">
                                    <option value="Intralesional">Intralesional</option>
                                    <option value="Intramuscular">Intramuscular</option>
                                    <option value="Intraocular">Intraocular</option>
                                    <option value="Intravenous">Intravenous</option>
                                    <option value="Nasal">Nasal</option>
                                    <option value="Oral">Oral</option>
                                    <option value="Rectal">Rectal</option>
                                    <option value="Inhalation">Inhalation</option>
                                    <option value="Subcutaneous">Subcutaneous</option>
                                    <option value="Topical">Topical</option>
                                    <option value="Transdermal">Transdermal</option>
                                    <option value="Vaginal">Vaginal</option>
                                    <option value="Other">Other</option>
                                </select>
                                <input type="text" name="routeOther" id="ROUTEO" placeholder="If other, please specify"></td>
                            </td>
                            <td><input type="date" name="startDate"></td>
                            <td>
                                <select name="ongoing" id="CMONGO">
                                    <option value="1">Yes</option>
                                    <option value="2">No</option>
                                </select>
                            </td>
                            <td><input type="date" name="endDate"></td>
                        </tr>
                    </table>
                </fieldset>
            </section>
        </div>
    </body>
</html>

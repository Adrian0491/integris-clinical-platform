<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Laboratory Assessment - Central</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main>
            <div>
                <header>
                    <h1>
                        Laboratory Assessment - Central
                    </h1>
                </header>
                <button id="saveBtn" class="save-btn" aria-label="Save" (onSave)="handleSave()">
                    Save
                </button>
            </div>
            <div>
                <section>
                    <fieldset>
                        <table id="labsTable">
                            <thead>
                                <tr>
                                    <th>Category</th>
                                    <th>Date of Collection</th>
                                    <th>Time of Collection</th>
                                    <th>Reference Range</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Hematology</td>
                                    <td><input id="HEMDT" name="HEMDT" type="date" required /></td>
                                    <td><input id="HEMTM" name="HEMTM" type="time" required /></td>
                                    <td><input id="HEMREFRNG" name="HEMREFRNG" type="text" required /></td>
                                </tr>
                                <tr>
                                    <td>Chemistry</td>
                                    <td><input id="CHEMDT" name="CHEMDT" type="date" required /></td>
                                    <td><input id="CHEMTM" name="CHEMTM" type="time" required /></td>
                                    <td><input id="CHEMREFRNG" name="CHEMREFRNG" type="text" required /></td>
                                </tr>
                                <tr>
                                    <td>Urinalysis</td>
                                    <td><input id="URINDT" name="URINDT" type="date" required /></td>
                                    <td><input id="URINTM" name="URINTM" type="time" required /></td>
                                    <td><input id="URINREFRNG" name="URINREFRNG" type="text" required /></td>
                                </tr>
                                <tr>
                                    <td>Coagulation</td>
                                    <td><input id="COAGDT" name="COAGDT" type="date" required /></td>
                                    <td><input id="COAGTM" name="COAGTM" type="time" required /></td>
                                    <td><input id="COAGREFRNG" name="COAGREFRNG" type="text" required /></td>
                                </tr>
                                <tr>
                                    <td>Other</td>
                                    <td><input id="OTHERDT" name="OTHERDT" type="date" required /></td>
                                    <td><input id="OTHERTM" name="OTHERTM" type="time" required /></td>
                                    <td><input id="OTHERREFRNG" name="OTHERREFRNG" type="text" required /></td>
                                </tr>
                            </tbody>
                        </table>
                    </fieldset>
                </section>
            </div>
        </main>
    </body>
</html>

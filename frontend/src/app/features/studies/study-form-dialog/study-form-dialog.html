<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" id="studyForm" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>STUDYID *</mat-label>
      <input matInput formControlName="study_id" [readonly]="isEdit" />
      @if (form.controls.study_id.hasError('required')) {
        <mat-error>Study ID is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phase</mat-label>
      <mat-select formControlName="phase">
        <mat-option value="">— None —</mat-option>
        <mat-option value="I">Phase I</mat-option>
        <mat-option value="II">Phase II</mat-option>
        <mat-option value="III">Phase III</mat-option>
        <mat-option value="IV">Phase IV</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Therapeutic Area</mat-label>
      <input matInput formControlName="therapeutic_area" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Sponsor</mat-label>
      <input matInput formControlName="sponsor" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button type="submit" form="studyForm"
          [disabled]="form.invalid || saving()">
    @if (saving()) { <mat-spinner diameter="18" /> } @else { {{ isEdit ? 'Save' : 'Create' }} }
  </button>
</mat-dialog-actions>

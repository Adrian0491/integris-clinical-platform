<mat-sidenav-container class="shell-container">
  <!-- ── Sidenav ──────────────────────────────────────────────────────────── -->
  <mat-sidenav
    #sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="isHandset() ? false : sidenavOpen()"
    class="shell-sidenav">

    <div class="sidenav-header">
      <mat-icon class="logo-icon">verified_user</mat-icon>
      <span class="logo-text">Integris Clinical Platform</span>
    </div>

    <mat-divider />

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' || item.route === '/validation' }"
           (click)="isHandset() && sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <mat-sidenav-content class="shell-content">

    <!-- Top toolbar -->
    <mat-toolbar class="shell-toolbar" color="primary">
      <button mat-icon-button (click)="isHandset() ? sidenav.toggle() : toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>

      <!-- User menu -->
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
        <div class="avatar">{{ userInitials() }}</div>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header">
          <span class="user-role">{{ auth.currentRole() | titlecase }}</span>
        </div>
        <mat-divider />
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <!-- Page content -->
    <div class="content-scroll">
      <router-outlet />
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>

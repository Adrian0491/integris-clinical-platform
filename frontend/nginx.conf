events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass https://integris-backend-dev-937675960249.europe-west1.run.app;
            proxy_set_header Host integris-backend-dev-937675960249.europe-west1.run.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
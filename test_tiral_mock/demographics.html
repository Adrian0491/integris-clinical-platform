<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <title>Demographics</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>
            Demographics
        </h1>
        <!--<h3><p>This is a mock demographics page for testing purposes.</p></h3>-->
        <!--<h4>Demographics details:</h4>-->
        <fieldset>
            <label for="age">Age: <input id="DMAGE" name="DMAGE" type="number" required /></label>
                <label for="gender">Gender:
                    <select id="DMSEX" name="DMSEX">
                        <option value="">(select one)</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </label>
                <label for="race">Race:
                    <select id="DMRACE" name="DMRACE">
                        <option value="">(select one)</option>
                        <option value="1">White</option>
                        <option value="2">Black or African American</option>
                        <option value="3">Asian</option>
                        <option value="4">American Indian or Alaska Native</option>
                        <option value="5">Native Hawaiian or Other Pacific Islander</option>
                        <option value="6">Other</option>
                    </select>
                </label>
                <label for="DMRACEOTH">Specify Other Race:<input id="DMRACEOTH" name="DMRACEOTH" type="text" required /></label>
                <label for="ethnicity">Ethnicity:
                    <select id="DMETHNIC" name="DMETHNIC">
                        <option value="">(select one)</option>
                        <option value="1">Hispanic or Latino</option>
                        <option value="2">Not Hispanic or Latino</option>
                        <option value="3">Unknown</option>
                    </select>
                </label>
        </fieldset>
    </body>
</html>

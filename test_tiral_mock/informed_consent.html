<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <title>Informed Consent</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>
            Informed Consent
        </h1>
        <h3><p>This is a mock informed consent page for testing purposes.</p></h3>
        <fieldset>
            <h4>Informed consent details:</h4>
            <label for="visit-date">Informed Consent Date: <input id="ICDT" name="ICDT" type="date" required /></label>
                <label for="referrer">Was Informed Consent signed by the patient?
                    <select id="referrer" name="referrer">
                        <option value="">(select one)</option>
                            <option value="1">Yes</option>
                            <option value="2">No</option>
                    </select>
                </label>
            <h4>Future study informed consent</h4>
            <label for="visit-date">Future Informed Consent Date: <input id="FICDT" name="FICDT" type="date" required /></label>
                <label for="referrer">Was the future study informed consent signed by the patient?
                    <select id="referrer" name="referrer">
                        <option value="">(select one)</option>
                        <option value="1">Yes</option>
                        <option value="2">No</option>
                    </select>
                </label>
        </fieldset>
    </body>
</html>

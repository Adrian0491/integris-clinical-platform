<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <title>Vital Signs</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>
            Vital Signs
        </h1>
        <fieldset>
            <h4>Vital signs details:</h4>
            <label for="vitalSignsDate">Vital Signs Date: <input id="VSDT" name="VSDT" type="date" required /></label>
                <label for="referrer">Were the vital signs taken?
                    <select id="referrer" name="referrer">
                        <option value="">(select one)</option>
                            <option value="1">Yes</option>
                            <option value="2">No</option>
                    </select>
                </label>
        </fieldset>
    </body>
</html>

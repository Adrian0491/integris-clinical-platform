<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Drug Administration</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>
                Drug Administration
            </h1>
        </header>
        <section>
            <fieldset>
                <h4>Drug administration details:</h4>
                <label for="drugAdministrationDate">Drug Administration Date: <input id="EXADT" name="EXADT" type="date" required /></label>
                <label for="drugAdministrationTime">Drug Administration Time: <input id="EXATM" name="EXATM" type="time" required /></label>
                    <label for="referrer">Was the drug administered to the patient?
                        <select id="referrer" name="referrer">
                            <option value="">(select one)</option>
                                <option value="1">Yes</option>
                                <option value="2">No</option>
                        </select>
                    </label>
            </fieldset>
        </section>
    </body>
</html>
